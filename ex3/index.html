<!DOCTYPE html>
<html lang="zh-Hant">
<head>
    <meta charset="UTF-8">
    <title>資工選課表</title>
    <style>
        #course-table {
            width: 100%;
            border-collapse: collapse;
            font-family: "Segoe UI", Tahoma, sans-serif;
        }

        #course-table td, #course-table th {
            border: 1px solid #dddddd;
            padding: 7px;
        }

        #course-table tr:nth-child(even) {
            background-color: #f2f2f2;
        }

        #course-table tr:hover {
            background-color: #e9e9e9;
        }

        #course-table th {
            text-align: left;
            padding-top: 12px;
            padding-bottom: 12px;
            color: #ffffff;
            background-color: #04AA6D;
        }
    </style>
</head>
<body>

    <h3>資工選課表</h3>

    <table id="course-table">
        <thead>
            <tr>
                <th>開課單位</th>
                <th>課程名稱</th>
                <th>授課教師</th>
            </tr>
        </thead>
        <tbody>
            <tr>
                <td>資工系</td>
                <td>物件導向軟體設計</td>
                <td>黃崇源</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>計算機網路實驗</td>
                <td>李春良</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>作業系統實務</td>
                <td>張哲維</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>生物統計</td>
                <td>陳光武</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>通訊系統</td>
                <td>陳仁暉</td>
            </tr>
            <tr>
                <td>資工系</td>
                <td>軟硬體專題(2)</td>
                <td>魏志達</td>
            </tr>
        </tbody>
    </table>

</body>
</html>
