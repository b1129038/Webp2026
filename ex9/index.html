<!DOCTYPE html>
<html lang="zh-Hant">
<head>
  <meta charset="UTF-8">
  <title>Lab#9 - Flickr 照片牆</title>
  <style>
    /* 延續簡報 Page 17 的 gallery 樣式 */
    body {
      font-family: -apple-system, "Helvetica Neue", Arial, sans-serif;
      background: #fafafa;
      margin: 0;
      padding: 24px;
    }
    .container { max-width: 1250px; margin: 0 auto; }
    h1 { color: #333; margin-bottom: 12px; }

    #btnGetImg {
      padding: 8px 18px;
      font-size: 15px;
      background: #0095f6;
      color: white;
      border: none;
      border-radius: 6px;
      cursor: pointer;
      margin-bottom: 10px;
    }
    #btnGetImg:hover    { background: #007acc; }
    #btnGetImg:disabled { background: #aaa; cursor: not-allowed; }

    #status { color: #666; font-size: 14px; min-height: 20px; }

    .gallery {
      --g: 6px;                            /* the gap */
      display: grid;
      width: 1200px;                       /* the size */
      max-width: 100%;
      aspect-ratio: 1;
      grid: auto-flow 1fr / repeat(3, 1fr);
      gap: var(--g);
    }
    .gallery img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      filter: grayscale();
      cursor: pointer;
      transition: .5s;
    }
    .gallery img:hover { filter: grayscale(0); }

    .gallery img:nth-child(2) {
      grid-area: 1 / 2 / span 2 / span 2;
      clip-path: polygon(
        0 0,
        100% 0,
        100% 100%,
        calc(50% + var(--g)/4) 100%,
        0 calc(50% - var(--g)/4)
      );
    }
    .gallery img:nth-child(3) {
      grid-area: 2 / 1 / span 2 / span 2;
      clip-path: polygon(
        0 0,
        calc(50% - var(--g)/4) 0,
        100% calc(50% + var(--g)/4),
        100% 100%,
        0 100%
      );
    }
  </style>
</head>
<body>
  <div class="container">
    <h1>Flickr 照片牆</h1>
    <button id="btnGetImg" onclick="getimg()">Get IMG</button>
    <p id="status"></p>
    <div id="gallery" class="gallery"></div>
  </div>

  <script src="app.js"></script>
</body>
</html>
