<!DOCTYPE html>
<html lang="zh-TW">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>景點觀光展覽資訊</title>
  <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.0.2/dist/css/bootstrap.min.css" rel="stylesheet">
  <style>
    body {
      background: #f4f6f9;
      font-family: 'Noto Sans TC', sans-serif;
    }
    h1 {
      color: #2c3e50;
      font-weight: 700;
      margin-bottom: 20px;
    }
    .search-input {
      border: 2px solid #3498db;
      border-radius: 8px;
      padding: 6px 14px;
      font-size: 1rem;
      outline: none;
      transition: box-shadow 0.2s;
      width: 220px;
    }
    .search-input:focus {
      box-shadow: 0 0 0 3px rgba(52,152,219,0.2);
    }
    .table thead th {
      background-color: #27ae60;
      color: white;
      font-size: 0.95rem;
    }
    .table tbody tr:hover {
      background-color: #eaf6fb;
    }
    .table td {
      vertical-align: middle;
      font-size: 0.9rem;
    }
    .pagination-bar {
      display: flex;
      align-items: center;
      gap: 10px;
      margin-top: 14px;
    }
    .pagination-bar button {
      padding: 6px 18px;
      border: 2px solid #27ae60;
      background: white;
      color: #27ae60;
      border-radius: 6px;
      font-size: 0.95rem;
      cursor: pointer;
      transition: background 0.15s, color 0.15s;
    }
    .pagination-bar button:hover:not(:disabled) {
      background: #27ae60;
      color: white;
    }
    .pagination-bar button:disabled {
      opacity: 0.4;
      cursor: not-allowed;
    }
    .page-info {
      font-size: 1rem;
      color: #555;
      font-weight: 500;
    }
    .loading-msg {
      text-align: center;
      padding: 40px;
      color: #888;
      font-size: 1.1rem;
    }
    .error-msg {
      color: #e74c3c;
      background: #fdecea;
      padding: 12px 18px;
      border-radius: 8px;
      margin: 20px 0;
    }
    .header-row {
      display: flex;
      align-items: center;
      gap: 20px;
      flex-wrap: wrap;
      margin-bottom: 18px;
    }
  </style>
</head>
<body>
<div class="container py-4">
  <div class="header-row">
    <h1 class="mb-0">景點觀光展覽資訊</h1>
    <input
      type="text"
      id="searchInput"
      class="search-input"
      placeholder="搜尋名稱..."
      onchange="onSearchChange()"
      oninput="onSearchChange()"
    >
  </div>

  <div id="loadingMsg" class="loading-msg">資料載入中...</div>
  <div id="errorMsg" class="error-msg" style="display:none;"></div>

  <div id="tableArea" style="display:none;">
    <table class="table table-striped table-hover">
      <thead>
        <tr>
          <th>名稱</th>
          <th>地點</th>
          <th>票價</th>
        </tr>
      </thead>
      <tbody id="tableBody"></tbody>
    </table>

    <div class="pagination-bar">
      <button id="prevBtn" onclick="prevPage()">上一頁</button>
      <span class="page-info" id="pageInfo">1 / 1 頁</span>
      <button id="nextBtn" onclick="nextPage()">下一頁</button>
    </div>
  </div>
</div>

<script>
  var allData = [];
  var filteredData = [];
  var currentPage = 1;
  var pageSize = 10;

  var openUrl = "https://cloud.culture.tw/frontsite/trans/SearchShowAction.do?method=doFindTypeJ&category=6";

  window.onload = function () {
    var xhr = new XMLHttpRequest();
    xhr.open('GET', openUrl, true);
    xhr.send();
    xhr.onreadystatechange = function () {
      if (this.readyState === 4) {
        document.getElementById('loadingMsg').style.display = 'none';
        if (this.status === 200) {
          try {
            allData = JSON.parse(this.responseText);
            filteredData = allData.slice();
            currentPage = 1;
            document.getElementById('tableArea').style.display = 'block';
            renderTable();
          } catch (e) {
            showError('資料解析失敗：' + e.message);
          }
        } else {
          showError('API 請求失敗，狀態碼：' + this.status);
        }
      }
    };
  };

  function showError(msg) {
    var el = document.getElementById('errorMsg');
    el.textContent = msg;
    el.style.display = 'block';
  }

    function onSearchChange() {
    var keyword = document.getElementById('searchInput').value.trim();
    if (keyword === '') {
      filteredData = allData.slice();
    } else {
      filteredData = allData.filter(function (item) {
        return item['title'] && item['title'].indexOf(keyword) !== -1;
      });
    }
    currentPage = 1;
    renderTable();
  }

  function renderTable() {
    var tbody = document.getElementById('tableBody');
    tbody.innerHTML = '';

    var totalPages = Math.max(1, Math.ceil(filteredData.length / pageSize));
    if (currentPage > totalPages) currentPage = totalPages;

    var start = (currentPage - 1) * pageSize;
    var end = Math.min(start + pageSize, filteredData.length);
    var pageData = filteredData.slice(start, end);

    pageData.forEach(function (data) {
      var row = tbody.insertRow(-1);
      row.insertCell(0).innerHTML = data['title'] || '';
      row.insertCell(1).innerHTML = (data['showInfo'] && data['showInfo'][0]) ? (data['showInfo'][0]['location'] || '') : '';
      row.insertCell(2).innerHTML = (data['showInfo'] && data['showInfo'][0]) ? (data['showInfo'][0]['price'] || '') : '';
    });

    document.getElementById('pageInfo').textContent = currentPage + ' / ' + totalPages + ' 頁';
    document.getElementById('prevBtn').disabled = (currentPage <= 1);
    document.getElementById('nextBtn').disabled = (currentPage >= totalPages);
  }

  function prevPage() {
    if (currentPage > 1) {
      currentPage--;
      renderTable();
    }
  }

  function nextPage() {
    var totalPages = Math.ceil(filteredData.length / pageSize);
    if (currentPage < totalPages) {
      currentPage++;
      renderTable();
    }
  }
</script>
</body>
</html>
